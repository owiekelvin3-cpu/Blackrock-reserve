<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#121214" />
    <title>Offline · BlackrockReserve</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #121214;
        color: #f4f4f5;
        padding: 2rem;
      }
      .card {
        max-width: 24rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.75rem;
      }
      p {
        color: #a1a1aa;
        line-height: 1.5;
        margin: 0 0 1.5rem;
      }
      a {
        display: inline-block;
        padding: 0.75rem 1.25rem;
        border-radius: 9999px;
        background: linear-gradient(135deg, #ff5f05, #dc2626);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        BlackrockReserve needs a connection for live balances and secure actions.
        Previously visited pages may still be available when you go back.
      </p>
      <a href="/">Try again</a>
    </div>
  </body>
</html>
